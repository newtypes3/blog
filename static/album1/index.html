<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>18:00 CLASSROOM — 放課後 / MINIDISC</title>
<meta name="description" content="放課後 · 18:00 CLASSROOM — 17 tracks recorded to MiniDisc.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=JetBrains+Mono:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#160a22;        /* deepest */
    --bg-1:#1a0c28;        /* base indigo */
    --bg-2:#231034;        /* panel */
    --bg-3:#2e1745;        /* raised */
    --line:#3a2257;
    --pink:#ff3cac;        /* primary accent */
    --pink-deep:#aa2a7b;
    --violet:#7b5cff;      /* secondary accent */
    --fg-0:#f6effd;        /* near white */
    --fg-1:#cdbfe0;
    --fg-2:#9d8cba;
    --fg-3:#6d5789;
    --mono:'JetBrains Mono',ui-monospace,monospace;
    --disp:'Anton',sans-serif;
    --body:'Noto Sans JP',system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{
    font-family:var(--body);
    background:var(--bg-1);
    color:var(--fg-0);
    line-height:1.6;
    padding-bottom:104px;            /* room for sticky player */
    background-image:
      radial-gradient(1200px 600px at 80% -10%, rgba(123,92,255,.18), transparent 60%),
      radial-gradient(900px 500px at -10% 10%, rgba(255,60,172,.14), transparent 55%),
      repeating-linear-gradient(0deg, rgba(255,255,255,.014) 0 1px, transparent 1px 3px);
    background-attachment:fixed;
  }
  a{color:inherit;text-decoration:none}

  .wrap{max-width:920px;margin:0 auto;padding:0 24px}

  /* ── top deco bar ── */
  .topbar{
    height:6px;
    background:linear-gradient(90deg,var(--pink) 0%,var(--violet) 50%,var(--pink) 100%);
  }

  /* ── hero ── */
  .hero{padding:56px 0 40px;display:grid;grid-template-columns:300px 1fr;gap:40px;align-items:start}
  .cover{position:relative}
  .cover img{width:100%;display:block;border:1px solid var(--line);box-shadow:0 24px 60px rgba(0,0,0,.5)}
  .cover .tag{
    position:absolute;top:-11px;left:-11px;
    font-family:var(--mono);font-size:11px;letter-spacing:.12em;
    background:var(--pink);color:#1a0c28;font-weight:600;
    padding:4px 9px;text-transform:uppercase;
  }

  .meta{padding-top:6px}
  .kicker{font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--violet);text-transform:uppercase;margin-bottom:14px}
  .title{font-family:var(--disp);font-size:clamp(48px,9vw,92px);line-height:.92;letter-spacing:.01em;color:var(--fg-0);text-transform:uppercase}
  .title .colon{color:var(--pink)}
  .jp{font-size:26px;font-weight:700;color:var(--pink);margin-top:10px;letter-spacing:.06em}
  .specs{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
  .chip{font-family:var(--mono);font-size:12px;letter-spacing:.1em;border:1px solid var(--line);color:var(--fg-1);padding:6px 11px;text-transform:uppercase}
  .chip b{color:var(--pink);font-weight:600}
  .blurb{margin-top:22px;color:var(--fg-2);font-size:14px;max-width:46ch}

  /* ── section heads ── */
  .sec-head{display:flex;align-items:center;gap:14px;margin:14px 0 18px}
  .sec-head h2{font-family:var(--mono);font-size:13px;letter-spacing:.2em;color:var(--fg-2);text-transform:uppercase;font-weight:600}
  .sec-head .rule{flex:1;height:1px;background:var(--line)}

  /* ── tracklist ── */
  .tracks{list-style:none;border-top:1px solid var(--line)}
  .track{
    display:grid;grid-template-columns:34px 1fr auto;gap:14px;align-items:center;
    padding:13px 12px;border-bottom:1px solid var(--line);cursor:pointer;
    filter:blur(0);
    transition:background .15s,padding-left .15s,filter .7s ease,opacity .7s ease;
  }
  .track:hover{background:var(--bg-2);padding-left:18px}
  .track .num{font-family:var(--mono);font-size:13px;color:var(--fg-3);text-align:right}
  .track .info{min-width:0}
  .track .tt{font-weight:500;color:var(--fg-0);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .track .ar{font-size:12.5px;color:var(--fg-2);margin-top:1px}
  .track .dur{font-family:var(--mono);font-size:13px;color:var(--fg-3)}

  /* playing / paused state */
  .track.active{background:linear-gradient(90deg,rgba(255,60,172,.14),transparent 70%)}
  .track.active .num{color:transparent;position:relative}
  .track.active .num::after{
    content:"";position:absolute;right:6px;top:50%;transform:translateY(-50%);
    width:10px;height:10px;border-radius:50%;background:var(--pink);
    box-shadow:0 0 0 0 rgba(255,60,172,.6);
  }
  .track.active.playing .num::after{animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(255,60,172,.55)}70%{box-shadow:0 0 0 7px rgba(255,60,172,0)}100%{box-shadow:0 0 0 0 rgba(255,60,172,0)}}
  .track.active .tt{color:var(--pink)}
  .track.missing{cursor:not-allowed;opacity:.5}
  .track .badge{font-family:var(--mono);font-size:10px;letter-spacing:.08em;color:var(--bg-1);background:var(--fg-3);padding:2px 6px;border-radius:2px;display:none}
  .track.missing .badge{display:inline-block}
  .track.missing .dur{display:none}

  /* not yet reached — just frosted, no lock chrome */
  .track.locked{filter:blur(6px);opacity:.45;pointer-events:none;user-select:none}

  /* ── back-cover credit (hidden until the album has been heard through) ── */
  .closer{margin:44px 0 72px;display:none}
  .closer.revealed{display:block;animation:reveal 1.1s ease both}
  .closer.instant{animation:none}
  @keyframes reveal{from{opacity:0;filter:blur(14px)}to{opacity:1;filter:blur(0)}}
  .closer .note{color:var(--fg-2);font-size:14px;text-align:center;margin-bottom:4px}
  .closer .mono{font-family:var(--mono);font-size:12px;color:var(--fg-3);letter-spacing:.06em;text-align:center;margin-bottom:22px}
  .closer .back{display:block;width:100%;max-width:600px;margin:0 auto;border:1px solid var(--line);box-shadow:0 16px 48px rgba(0,0,0,.45)}
  .zoomable{cursor:zoom-in;transition:filter .15s}
  .zoomable:hover{filter:brightness(1.06)}

  /* ── lightbox ── */
  .lightbox{position:fixed;inset:0;z-index:100;background:rgba(8,4,14,.93);display:none;place-items:center;padding:32px;cursor:zoom-out}
  .lightbox.open{display:grid}
  .lightbox img{max-width:min(96vw,1100px);max-height:92vh;border:1px solid var(--line);box-shadow:0 24px 80px rgba(0,0,0,.6)}
  .lightbox .hint{position:fixed;top:18px;right:24px;font-family:var(--mono);font-size:12px;color:var(--fg-2);letter-spacing:.1em}

  /* ── sticky player ── */
  .player{
    position:fixed;left:0;right:0;bottom:0;z-index:50;
    background:rgba(22,10,34,.92);backdrop-filter:blur(12px);
    border-top:1px solid var(--line);
  }
  .player-inner{max-width:920px;margin:0 auto;padding:14px 24px;display:grid;grid-template-columns:auto auto 1fr auto;gap:18px;align-items:center}
  .disc{width:52px;height:52px;border-radius:50%;flex:none;
    background-image:url('img/disc.png');background-size:cover;background-position:center;
    border:1px solid var(--line);box-shadow:0 0 0 4px var(--bg-2);
    will-change:transform;transform:translateZ(0);backface-visibility:hidden;}
  .disc.spin{animation:spin 5s linear infinite}
  @keyframes spin{from{transform:translateZ(0) rotate(0)}to{transform:translateZ(0) rotate(360deg)}}
  .controls{display:flex;align-items:center;gap:6px}
  .controls button{
    background:none;border:none;color:var(--fg-1);cursor:pointer;
    width:38px;height:38px;display:grid;place-items:center;border-radius:50%;transition:.15s;
  }
  .controls button:hover{color:var(--fg-0);background:var(--bg-3)}
  .controls .play{background:var(--pink);color:#160a22;width:44px;height:44px}
  .controls .play:hover{background:#ff5cbb;color:#160a22}
  .controls svg{width:18px;height:18px;fill:currentColor}
  .now{min-width:0;display:flex;flex-direction:column;justify-content:center}
  .now .nt{font-weight:500;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .now .na{font-size:12px;color:var(--fg-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .seek{display:flex;align-items:center;gap:10px;margin-top:5px}
  .seek .t{font-family:var(--mono);font-size:11px;color:var(--fg-3);min-width:34px}
  .bar{flex:1;height:4px;background:var(--line);border-radius:2px;cursor:pointer;position:relative}
  .bar .fill{position:absolute;left:0;top:0;bottom:0;width:0;background:linear-gradient(90deg,var(--pink),var(--violet));border-radius:2px}
  .vol{display:flex;align-items:center;gap:8px;color:var(--fg-3)}
  .vol input{width:80px;accent-color:var(--pink)}

  @media (max-width:760px){
    .hero{grid-template-columns:1fr;gap:24px}
    .cover{max-width:280px}
    .closer{grid-template-columns:1fr}
    .closer img{max-width:240px}
    .player-inner{grid-template-columns:auto 1fr auto;gap:12px;padding:10px 16px}
    .disc{display:none}
    .vol{display:none}
  }
</style>
</head>
<body>
<div class="topbar"></div>

<div class="wrap">
  <header class="hero">
    <div class="cover">
      <span class="tag">Recorded to MiniDisc</span>
      <img class="zoomable" src="img/front.png" alt="18:00 CLASSROOM front cover" data-zoom>
    </div>
    <div class="meta">
      <div class="kicker">放課後 · MINIDISC · 7/13</div>
      <h1 class="title">18<span class="colon">:</span>00<br>CLASSROOM</h1>
      <div class="jp">放課後</div>
      <div class="specs">
        <span class="chip"><b>17</b> TRACKS</span>
        <span class="chip"><b>72:48</b> TOTAL</span>
        <span class="chip">SOUNDTRACKS</span>
      </div>
      <p class="blurb">17 首 2010s 大热的动画 oped ，按已刻录的 MD 顺序播放。</p>
    </div>
  </header>

  <section>
    <div class="sec-head"><h2>Tracklist</h2><span class="rule"></span></div>
    <ol class="tracks" id="tracks"></ol>
  </section>

  <section class="closer">
    <p class="note">For nanoseed.</p>
    <p class="mono">17 TRACKS / 72:48 · RECORDED TO MINIDISC · 点击放大</p>
    <img class="back zoomable" src="img/back.png" alt="back cover — full tracklist" data-zoom>
  </section>
</div>

<div class="lightbox" id="lightbox">
  <span class="hint">点击任意处关闭 / ESC</span>
  <img id="lightboxImg" alt="">
</div>

<!-- ── sticky player ── -->
<div class="player">
  <div class="player-inner">
    <div class="disc" id="disc"></div>
    <div class="controls">
      <button id="prev" title="上一首"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6l8.5 6V6z"/></svg></button>
      <button class="play" id="play" title="播放/暂停"><svg viewBox="0 0 24 24"><path id="playicon" d="M8 5v14l11-7z"/></svg></button>
      <button id="next" title="下一首"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zm-2 6L5.5 6v12z"/></svg></button>
    </div>
    <div class="now">
      <div class="nt" id="nowTitle">选择一首开始 —</div>
      <div class="na" id="nowArtist">18:00 CLASSROOM</div>
      <div class="seek">
        <span class="t" id="cur">0:00</span>
        <div class="bar" id="bar"><div class="fill" id="fill"></div></div>
        <span class="t" id="tot">0:00</span>
      </div>
    </div>
    <div class="vol">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3a4.5 4.5 0 00-2.5-4v8a4.5 4.5 0 002.5-4z"/></svg>
      <input type="range" id="vol" min="0" max="1" step="0.01" value="0.9">
    </div>
  </div>
</div>

<audio id="audio" preload="metadata"></audio>

<script>
// Track order = MD play order. `file` is looked up under audio/.
// Drop files named audio/01.mp3 … audio/17.mp3 (or change `file` below).
const TRACKS = [
  {n:'01', title:'crossing field',      artist:'LiSA',              dur:'4:11', file:'audio/01.mp3'},
  {n:'02', title:'ヒトリゴト',          artist:'ClariS',            dur:'3:55', file:'audio/02.mp3'},
  {n:'03', title:'This game',           artist:'鈴木このみ',        dur:'4:42', file:'audio/03.mp3'},
  {n:'04', title:'透明だった世界',      artist:'秦基博',            dur:'3:53', file:'audio/04.mp3'},
  {n:'05', title:'chAngE',              artist:'miwa',              dur:'4:10', file:'audio/05.mp3'},
  {n:'06', title:'ninelie',             artist:'Aimer with chelly', dur:'4:20', file:'audio/06.mp3'},
  {n:'07', title:'嘘の火花',            artist:'96猫',              dur:'3:43', file:'audio/07.mp3'},
  {n:'08', title:'Don’t say “lazy”', artist:'K-ON!', dur:'4:24', file:'audio/08.mp3'},
  {n:'09', title:'回レ!雪月花',         artist:'岸田教団',          dur:'3:56', file:'audio/09.mp3'},
  {n:'10', title:'fallen down',         artist:'早見沙織',          dur:'4:01', file:'audio/10.mp3'},
  {n:'11', title:'God knows...',        artist:'平野綾',            dur:'4:39', file:'audio/11.mp3'},
  {n:'12', title:'光るなら',            artist:'Goose house',       dur:'4:14', file:'audio/12.mp3'},
  {n:'13', title:'シルエット',          artist:'KANA-BOON',         dur:'4:02', file:'audio/13.mp3'},
  {n:'14', title:'Brave Shine',         artist:'Aimer',             dur:'3:54', file:'audio/14.mp3'},
  {n:'15', title:'Best of my Love',     artist:'安田レイ',          dur:'5:45', file:'audio/15.mp3'},
  {n:'16', title:'ambiguous',           artist:'GARNiDELiA',        dur:'4:31', file:'audio/16.mp3'},
  {n:'17', title:'aLIEz',               artist:'mizuki',            dur:'4:28', file:'audio/17.mp3'},
];

const audio  = document.getElementById('audio');
const listEl = document.getElementById('tracks');
const $ = id => document.getElementById(id);
let cur = -1;

// ── progressive reveal ──
// Track 0 is open. Playing a track for ≥5s reveals the next one; after the
// final track passes 5s the back cover is revealed. Progress is remembered.
// Add #reset to the URL to start over.
const TOTAL = TRACKS.length;
const SAVE_KEY = 'album1-progress';
let unlocked = 1;      // number of revealed tracks
let backShown = false;
if (location.hash === '#reset') { try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }
else { try{ const s = JSON.parse(localStorage.getItem(SAVE_KEY)||'{}'); unlocked = Math.min(Math.max(s.u|0,1), TOTAL); backShown = !!s.b; }catch(e){} }
function persist(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify({u:unlocked,b:backShown})); }catch(e){} }

// build list — locked rows carry the class from the first paint (no flash of readable text)
TRACKS.forEach((t,i)=>{
  const li = document.createElement('li');
  li.className = 'track' + (i >= unlocked ? ' locked' : '');
  li.dataset.i = i;
  li.innerHTML =
    `<span class="num">${t.n}</span>`+
    `<span class="info"><span class="tt">${t.title}</span><span class="ar">${t.artist}</span></span>`+
    `<span class="dur">${t.dur}</span><span class="badge">音频待补</span>`;
  li.addEventListener('click',()=>{ if(li.classList.contains('missing')||li.classList.contains('locked'))return; play(i); });
  listEl.appendChild(li);
});
const rows = [...listEl.children];

// back cover: hidden by default; reveal instantly (no replay) if already earned
const closer = document.querySelector('.closer');
if (backShown) closer.classList.add('revealed','instant');

function unlockNext(){
  if (cur < 0) return;
  if (cur+1 < TOTAL){
    if (cur+1 >= unlocked){ unlocked = cur+2; rows[cur+1].classList.remove('locked'); persist(); }
  } else if (!backShown){
    backShown = true; closer.classList.add('revealed'); persist();
  }
}

function fmt(s){ if(!isFinite(s))return '0:00'; s=Math.floor(s); return Math.floor(s/60)+':'+String(s%60).padStart(2,'0'); }

function setActive(i){
  rows.forEach((r,j)=>r.classList.toggle('active', j===i));
}
function play(i){
  cur = i;
  const t = TRACKS[i];
  audio.src = t.file;
  audio.play().catch(()=>{});
  $('nowTitle').textContent = t.title;
  $('nowArtist').textContent = t.artist;
  setActive(i);
}
function toggle(){
  if(cur===-1){ play(0); return; }
  if(audio.paused) audio.play(); else audio.pause();
}

$('play').addEventListener('click',toggle);
$('prev').addEventListener('click',()=>{ if(cur<=0)return; let p=cur-1; while(p>=0&&rows[p].classList.contains('missing'))p--; if(p>=0)play(p); });
$('next').addEventListener('click',nextTrack);
function nextTrack(){ let p=cur+1; while(p<TRACKS.length&&rows[p].classList.contains('missing'))p++; if(p<TRACKS.length && p<unlocked)play(p); }

audio.addEventListener('play', ()=>{ $('playicon').setAttribute('d','M6 5h4v14H6zm8 0h4v14h-4z'); $('disc').classList.add('spin'); rows[cur]&&rows[cur].classList.add('playing'); });
audio.addEventListener('pause',()=>{ $('playicon').setAttribute('d','M8 5v14l11-7z'); $('disc').classList.remove('spin'); rows.forEach(r=>r.classList.remove('playing')); });
audio.addEventListener('ended', nextTrack);
audio.addEventListener('loadedmetadata',()=>{ $('tot').textContent = fmt(audio.duration); });
audio.addEventListener('timeupdate',()=>{
  $('cur').textContent = fmt(audio.currentTime);
  const p = audio.duration ? audio.currentTime/audio.duration : 0;
  $('fill').style.width = (p*100)+'%';
  if (audio.currentTime >= 5) unlockNext();
});
audio.addEventListener('error',()=>{
  if(cur>-1){ rows[cur].classList.add('missing'); rows[cur].classList.remove('active','playing'); }
  $('disc').classList.remove('spin'); $('playicon').setAttribute('d','M8 5v14l11-7z');
});

// seek
$('bar').addEventListener('click',e=>{
  if(!audio.duration)return;
  const r=$('bar').getBoundingClientRect();
  audio.currentTime = ((e.clientX-r.left)/r.width)*audio.duration;
});
// volume
audio.volume = 0.9;
$('vol').addEventListener('input',e=>audio.volume=e.target.value);

// lightbox for cover art (click to enlarge, click anywhere / ESC to close)
const lb = $('lightbox'), lbImg = $('lightboxImg');
document.querySelectorAll('[data-zoom]').forEach(img=>{
  img.addEventListener('click',()=>{ lbImg.src = img.src; lb.classList.add('open'); });
});
lb.addEventListener('click',()=>lb.classList.remove('open'));
document.addEventListener('keydown',e=>{ if(e.key==='Escape') lb.classList.remove('open'); });
</script>
</body>
</html>
