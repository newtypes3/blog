# categories.toml — category → accent color mapping
#
# Keys are lowercased category names. Hugo merges site-level data/ over theme-level,
# so users can override or add categories in their own data/categories.toml.
#
# Two categories only: shorts (microblog) and essays (long-form posts).

[shorts]
color = "var(--accent-lime)"
label = "SHORTS"

[essays]
color = "var(--fg-2)"
label = "ESSAYS"
